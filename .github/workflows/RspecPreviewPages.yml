name: RSpec Rule Docs Preview

on:
  push:
    branches: [master]
    paths:
      - 'analyzers/rspec/cs/**'
      - 'analyzers/rspec/vbnet/**'
  workflow_dispatch:
  delete:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: rspec-preview-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'delete' && (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Vendor syntax highlighting assets
        shell: bash
        env:
          HLJS_VERSION: 11.11.1
        run: |
          set -euo pipefail
          mkdir -p _site/vendor hljs-tmp
          base="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/$HLJS_VERSION"
          curl --fail --silent --show-error --retry 3 -o hljs-tmp/highlight.min.js "$base/highlight.min.js"
          curl --fail --silent --show-error --retry 3 -o hljs-tmp/vbnet.min.js "$base/languages/vbnet.min.js"
          curl --fail --silent --show-error --retry 3 -o hljs-tmp/github.min.css "$base/styles/github.min.css"
          curl --fail --silent --show-error --retry 3 -o hljs-tmp/github-dark.min.css "$base/styles/github-dark.min.css"
          sha256sum -c <<'SUMS'
          c4a399dd6f488bc97a3546e3476747b3e714c99c57b9473154c6fb8d259b9381  hljs-tmp/highlight.min.js
          05e574cc80446ae29610a51e148766dca68788e43934bc1d3dca8cf3cd1a0575  hljs-tmp/vbnet.min.js
          3a9a5def8b9c311e5ae43abde85c63133185eed4f0d9f67fea4b00a8308cf066  hljs-tmp/github.min.css
          9f208d022102b1d0c7aebfecd8e42ca7997d5de636649d2b31ea63093d809019  hljs-tmp/github-dark.min.css
          SUMS
          cat hljs-tmp/highlight.min.js hljs-tmp/vbnet.min.js > _site/vendor/highlight.js
          {
            cat hljs-tmp/github.min.css
            echo '@media (prefers-color-scheme: dark) {'
            cat hljs-tmp/github-dark.min.css
            echo '}'
            echo 'pre code.hljs { padding: 0; background: transparent; overflow-x: visible; }'
            echo '@media (prefers-color-scheme: light) { .hljs-built_in, .hljs-symbol { color: #b35900; } }'
          } > _site/vendor/hljs.css
          rm -rf hljs-tmp

      - name: Generate rule docs site
        shell: bash
        run: |
          set -euo pipefail

          TEMPLATES=.github/templates/rspec-preview

          if ! command -v envsubst >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y gettext-base
          fi

          declare -A LANG_LABEL=( [cs]="C#" [vbnet]="VB.NET" )
          declare -A HL_LANG=( [cs]="csharp" [vbnet]="vbnet" )

          mkdir -p _site
          INDEX=_site/index.html

          cp "$TEMPLATES/style.css" _site/style.css
          cp "$TEMPLATES/index-head.html" "$INDEX"

          for lang in $(printf '%s\n' "${!LANG_LABEL[@]}" | sort); do
            label="${LANG_LABEL[$lang]}"
            hl="${HL_LANG[$lang]}"
            src="analyzers/rspec/$lang"
            mkdir -p "_site/$lang"

            for json in "$src"/S*.json; do
              [ -e "$json" ] || continue
              base=$(basename "$json" .json)
              [[ "$base" =~ ^S[0-9]+$ ]] || continue
              html_src="$src/$base.html"
              [ -f "$html_src" ] || continue

              esc_title=$(jq -r '.title // "" | @html' "$json")
              esc_type=$(jq -r '.type // "" | @html' "$json")
              esc_severity=$(jq -r '.defaultSeverity // "" | @html' "$json")
              esc_tags=$(jq -r '(.tags // []) | join(", ") | @html' "$json")

              esc_tags_block=""
              if [ -n "$esc_tags" ]; then
                esc_tags_block="<div><dt>Tags</dt><dd>$esc_tags</dd></div>"
              fi

              page="_site/$lang/$base.html"
              {
                BASE="$base" ESC_TITLE="$esc_title" LABEL="$label" ESC_TYPE="$esc_type" \
                  ESC_SEVERITY="$esc_severity" ESC_TAGS_BLOCK="$esc_tags_block" \
                  envsubst '$BASE $ESC_TITLE $LABEL $ESC_TYPE $ESC_SEVERITY $ESC_TAGS_BLOCK' \
                  < "$TEMPLATES/rule-head.html"
                sed -e 's|<table>|<div class="table-scroll" role="group" aria-label="Scrollable table" tabindex="0"><table>|g' \
                    -e 's|</table>|</table></div>|g' \
                    -e "s|<pre\([^>]*\)>|<pre tabindex=\"0\"\1><code class=\"language-$hl\">|g" \
                    -e 's|</pre>|</code></pre>|g' "$html_src"
                cat "$TEMPLATES/rule-foot.html"
              } > "$page"

              BASE="$base" LANG_CODE="$lang" LABEL="$label" ESC_TITLE="$esc_title" \
                ESC_TYPE="$esc_type" ESC_SEVERITY="$esc_severity" ESC_TAGS="$esc_tags" \
                envsubst '$BASE $LANG_CODE $LABEL $ESC_TITLE $ESC_TYPE $ESC_SEVERITY $ESC_TAGS' \
                < "$TEMPLATES/row.html" >> "$INDEX"
            done
          done

          cat "$TEMPLATES/index-foot.html" >> "$INDEX"

      - name: Update preview site cache
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            DEPLOY_SUBPATH=""
          else
            DEPLOY_SUBPATH="preview/${{ github.ref_name }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          .github/scripts/rspec-preview-publish.sh _cache "$DEPLOY_SUBPATH" _site

      - name: Verify site root is present
        shell: bash
        run: |
          set -euo pipefail
          test -f _cache/index.html || {
            echo "::error::_cache/index.html is missing - gh-pages-data has no site root yet. Run this workflow on master (push or workflow_dispatch) at least once before relying on branch previews."
            exit 1
          }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _cache

  cleanup:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Remove branch preview from cache
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          .github/scripts/rspec-preview-publish.sh _cache "preview/${{ github.event.ref }}"

      - name: Verify site root is present
        shell: bash
        run: |
          set -euo pipefail
          test -f _cache/index.html || {
            echo "::error::_cache/index.html is missing - gh-pages-data has no site root yet. Run this workflow on master (push or workflow_dispatch) at least once before relying on branch previews."
            exit 1
          }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _cache

  deploy:
    needs: [build, cleanup]
    if: always() && (needs.build.result == 'success' || needs.cleanup.result == 'success')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
